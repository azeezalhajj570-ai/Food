<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Food System{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#ea580c",
              shell: "#fff8f1",
              ink: "#1f2937",
            },
            fontFamily: {
              display: ["Public Sans", "sans-serif"],
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css', v='20260324a') }}">
  </head>
  <body class="min-h-screen bg-[var(--shell)] font-display text-slate-900">
    <div class="flex min-h-screen flex-col">
      {% include "components/_topbar.html" %}
      {% include "components/_flashes.html" %}
      <main class="flex-1">
        {% block content %}{% endblock %}
      </main>
      {% include "components/_footer.html" %}
    </div>
  </body>
</html>
