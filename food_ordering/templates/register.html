{% extends "base.html" %}
{% block title %}Register | Food System{% endblock %}
{% block content %}
<section class="mx-auto flex w-full max-w-6xl items-center px-4 py-14 sm:px-6 lg:px-8">
  <div class="mx-auto w-full max-w-lg rounded-[2rem] border border-white/70 bg-white/90 p-8 shadow-xl shadow-orange-100">
    <p class="text-sm font-semibold uppercase tracking-[0.3em] text-[var(--brand)]">Create Account</p>
    <h1 class="mt-3 text-3xl font-black text-slate-900">Start ordering in minutes</h1>
    <form method="post" class="mt-8 grid gap-5">
      <div>
        <label for="name" class="mb-2 block text-sm font-semibold text-slate-700">Name</label>
        <input id="name" type="text" name="name" class="w-full rounded-2xl border-slate-200" required>
      </div>
      <div>
        <label for="email" class="mb-2 block text-sm font-semibold text-slate-700">Email</label>
        <input id="email" type="email" name="email" class="w-full rounded-2xl border-slate-200" required>
      </div>
      <div>
        <label for="password" class="mb-2 block text-sm font-semibold text-slate-700">Password</label>
        <input id="password" type="password" name="password" class="w-full rounded-2xl border-slate-200" required>
      </div>
      <button type="submit" class="rounded-2xl bg-[var(--brand)] px-6 py-3 text-sm font-semibold text-white">Register</button>
    </form>
  </div>
</section>
{% endblock %}
