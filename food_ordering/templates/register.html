{% extends "base.html" %}
{% block title %}Register | Food System{% endblock %}
{% block content %}
<!-- Registration page -->
<section class="mx-auto max-w-7xl px-4 pb-12 pt-8 sm:px-6 lg:px-8">
  <div class="mx-auto max-w-2xl">
    <div class="rounded-[2rem] border border-orange-100 bg-white p-6 shadow-panel sm:p-8">
      <p class="text-sm font-bold uppercase tracking-[0.24em] text-brand-dark">Registration form</p>
      <h2 class="mt-3 font-display text-3xl font-bold text-slate-950">Start ordering in minutes</h2>
      <form method="post" class="mt-8 space-y-5">
        <div>
          <label for="name" class="mb-2 block text-sm font-semibold text-slate-700">Full Name</label>
          <input id="name" type="text" name="name" required class="w-full rounded-2xl border-orange-100 bg-orange-50/40 px-4 py-3 text-slate-800 focus:border-brand focus:ring-brand">
        </div>
        <div>
          <label for="username" class="mb-2 block text-sm font-semibold text-slate-700">Username</label>
          <input id="username" type="text" name="username" required class="w-full rounded-2xl border-orange-100 bg-orange-50/40 px-4 py-3 text-slate-800 focus:border-brand focus:ring-brand">
        </div>
        <div>
          <label for="email" class="mb-2 block text-sm font-semibold text-slate-700">Email Address</label>
          <input id="email" type="email" name="email" required class="w-full rounded-2xl border-orange-100 bg-orange-50/40 px-4 py-3 text-slate-800 focus:border-brand focus:ring-brand">
        </div>
        <div>
          <label for="password" class="mb-2 block text-sm font-semibold text-slate-700">Password</label>
          <input id="password" type="password" name="password" required class="w-full rounded-2xl border-orange-100 bg-orange-50/40 px-4 py-3 text-slate-800 focus:border-brand focus:ring-brand">
        </div>
        <button type="submit" class="w-full rounded-2xl bg-brand px-6 py-3.5 text-sm font-bold text-white transition hover:bg-brand-dark">
          Register
        </button>
      </form>

      <p class="mt-5 text-sm text-slate-600">
        Already registered? <a href="{{ url_for('auth.login') }}" class="font-bold text-brand-dark">Login here</a>
      </p>
    </div>
  </div>
</section>
{% endblock %}
