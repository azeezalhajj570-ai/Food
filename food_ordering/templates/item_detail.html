{% extends "base.html" %}
{% block title %}{{ item.name }} | Food System{% endblock %}
{% block content %}
<section class="mx-auto w-full max-w-6xl px-4 py-10 sm:px-6 lg:px-8">
  <div class="grid gap-8 lg:grid-cols-[1.1fr_0.9fr]">
    <div class="rounded-[2rem] border border-white/70 bg-white/85 p-3 shadow-xl shadow-orange-100">
      <div class="h-[420px] rounded-[1.5rem] bg-cover bg-center" style="background-image: linear-gradient(135deg, rgba(15, 23, 42, 0.18), rgba(234, 88, 12, 0.24)), url('{{ item.image_url or "https://images.unsplash.com/photo-1546069901-ba9599a7e63c" }}');"></div>
    </div>
    <div class="rounded-[2rem] border border-white/70 bg-white/90 p-8 shadow-xl shadow-orange-100">
      <p class="text-sm font-semibold uppercase tracking-[0.3em] text-[var(--brand)]">{{ item.category.name }}</p>
      <h1 class="mt-3 text-4xl font-black text-slate-900">{{ item.name }}</h1>
      <p class="mt-5 text-base leading-8 text-slate-600">{{ item.description }}</p>
      <div class="mt-8 grid gap-4 sm:grid-cols-2">
        <div class="rounded-3xl bg-orange-50 p-5">
          <p class="text-sm text-slate-500">Price</p>
          <p class="mt-2 text-2xl font-bold text-[var(--brand)]">SAR {{ "%.2f"|format(item.price) }}</p>
        </div>
        <div class="rounded-3xl bg-slate-100 p-5">
          <p class="text-sm text-slate-500">Preparation time</p>
          <p class="mt-2 text-2xl font-bold text-slate-900">{{ item.prep_time }} min</p>
        </div>
      </div>
      <form action="{{ url_for('main.cart_add', item_id=item.id) }}" method="post" class="mt-8 space-y-4">
        <div>
          <label for="quantity" class="mb-2 block text-sm font-semibold text-slate-700">Quantity</label>
          <input id="quantity" type="number" name="quantity" value="1" min="1" class="w-32 rounded-2xl border-slate-200">
        </div>
        <button type="submit" class="rounded-2xl bg-[var(--brand)] px-6 py-3 text-sm font-semibold text-white">Add to Cart</button>
      </form>
    </div>
  </div>
</section>
{% endblock %}
