{% extends "base.html" %}
{% block title %}Login | Food System{% endblock %}
{% block content %}
<!-- Login page -->
<section class="mx-auto max-w-7xl px-4 pb-12 pt-8 sm:px-6 lg:px-8">
  <div class="mx-auto max-w-2xl">
    <div class="rounded-[2rem] border border-orange-100 bg-white p-6 shadow-panel sm:p-8">
      <p class="text-sm font-bold uppercase tracking-[0.24em] text-brand-dark">Authentication</p>
      <h1 class="mt-3 font-display text-4xl font-bold text-slate-950">Sign in to continue ordering and tracking</h1>
      <p class="mt-4 text-base leading-8 text-slate-600">
        Returning users can access their profile, order history, and checkout flow without friction.
      </p>

      <form method="post" class="mt-8 space-y-5">
        <div>
          <label for="login" class="mb-2 block text-sm font-semibold text-slate-700">Email Address or Username</label>
          <input id="login" type="text" name="login" required class="w-full rounded-2xl border-orange-100 bg-orange-50/40 px-4 py-3 text-slate-800 focus:border-brand focus:ring-brand">
        </div>
        <div>
          <label for="password" class="mb-2 block text-sm font-semibold text-slate-700">Password</label>
          <input id="password" type="password" name="password" required class="w-full rounded-2xl border-orange-100 bg-orange-50/40 px-4 py-3 text-slate-800 focus:border-brand focus:ring-brand">
        </div>
        <button type="submit" class="w-full rounded-2xl bg-brand px-6 py-3.5 text-sm font-bold text-white transition hover:bg-brand-dark">
          Login
        </button>
      </form>

      <p class="mt-5 text-sm text-slate-600">
        New user? <a href="{{ url_for('auth.register') }}" class="font-bold text-brand-dark">Create an account</a>
      </p>
    </div>
  </div>
</section>
{% endblock %}
